<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – EcoSort</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --primary-soft: #dcfce7;
      --text-main: #0f172a;
      --text-muted: #6b7280;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.08);
      --card-radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #bbf7d0, transparent 45%),
                  radial-gradient(circle at bottom right, #bae6fd, transparent 40%),
                  #f9fafb;
      color: var(--text-main);
    }

    a { color: inherit; text-decoration: none; }

    /* NAV */
    header {
      background: transparent;
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px 18px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--primary-dark);
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .nav-links {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
      color: var(--text-muted);
      align-items: center;
    }

    .btn-pill {
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.85rem;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-outline {
      border-color: #d1d5db;
      background: #ffffff;
    }

    .btn-outline:hover {
      background: #f3f4f6;
    }

    /* Layout */
    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .signup-box {
      width: 100%;
      max-width: 390px;
      background: #ffffff;
      border-radius: var(--card-radius);
      padding: 26px 24px 24px;
      box-shadow: var(--shadow-soft);
      text-align: center;
      transition: box-shadow 0.3s ease;
    }

    .signup-box h2 {
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 1.3rem;
    }

    .signup-box p {
      font-size: 0.9rem;
      margin-bottom: 14px;
      color: var(--text-muted);
    }

    .input-box {
      margin-bottom: 14px;
      text-align: left;
    }

    .input-box input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      outline: none;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-main);
      background: #f9fafb;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-box input::placeholder {
      color: #9ca3af;
    }

    .input-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary-soft);
      background: #ffffff;
    }

    .btn-signup {
      width: 100%;
      border-radius: 12px;
      border: none;
      padding: 11px;
      margin-top: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--primary);
      color: #ffffff;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-signup:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .login-link {
      margin-top: 10px;
      font-size: 0.85rem;
    }

    .login-link a {
      color: var(--primary-dark);
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* messages */
    .message-box {
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      text-align: left;
    }

    .error-box {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .success-box {
      background: #ecfdf3;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .signup-box.error-glow {
      box-shadow: 0 0 15px rgba(248, 113, 113, 0.7), var(--shadow-soft);
    }

    .signup-box.success-glow {
      box-shadow: 0 0 15px rgba(74, 222, 128, 0.7), var(--shadow-soft);
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="nav-inner">
      <a href="/" class="brand">
        <span class="brand-icon">♻</span>
        <span>EcoSort</span>
      </a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/#awareness">Awareness</a>
        <a href="/#features">Features</a>
        <a href="/login" class="btn-pill btn-outline">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <div class="signup-box" id="signup-box">
      <h2>Create your account</h2>
      <p>Start using AI to sort your waste responsibly.</p>

      <div id="message-container" class="hidden"></div>

      <form id="signup-form" action="/signup" method="POST">
        <div class="input-box">
          <input type="text" name="username" placeholder="Username" required />
        </div>
        <div class="input-box">
          <input type="password" name="password" id="password" placeholder="Password" required />
        </div>
        <div class="input-box">
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required />
        </div>
        <button type="submit" class="btn-signup">Sign up</button>
      </form>

      <div class="login-link">
        Already have an account? <a href="/login">Sign in</a>
      </div>

      <div class="footer">EcoSort • Developed by Vikas &amp; Team</div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('signup-form');
      const messageContainer = document.getElementById('message-container');
      const signupBox = document.getElementById('signup-box');
      const params = new URLSearchParams(window.location.search);

      // Show server-side error if present
      if (params.has('error')) {
        const errorMessage = decodeURIComponent(params.get('error'));
        const messageBox = document.createElement('div');
        messageBox.className = 'message-box error-box';
        messageBox.textContent = errorMessage;
        messageContainer.appendChild(messageBox);
        messageContainer.classList.remove('hidden');
        signupBox.classList.add('error-glow');
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        messageContainer.innerHTML = '';
        signupBox.classList.remove('error-glow', 'success-glow');
        messageContainer.classList.add('hidden');

        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm_password').value.trim();

        if (password !== confirmPassword) {
          const messageBox = document.createElement('div');
          messageBox.className = 'message-box error-box';
          messageBox.textContent = 'Error: Passwords do not match!';
          messageContainer.appendChild(messageBox);
          messageContainer.classList.remove('hidden');
          signupBox.classList.add('error-glow');
        } else {
          form.submit();
        }
      });
    });
  </script>
</body>
</html>
